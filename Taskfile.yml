version: "3"

tasks:
  db-start:
    cmds:
      - docker compose up -d postgres
    desc: Start local PostgreSQL container.

  db-stop:
    cmds:
      - docker compose stop postgres
    desc: Stop local PostgreSQL container.

  db-down:
    cmds:
      - docker compose down
    desc: Stop and remove local Docker Compose resources.

  db-logs:
    cmds:
      - docker compose logs -f postgres
    desc: Follow PostgreSQL logs.

  run-uvicorn:
    aliases: ["app-dev"]
    cmds:
      - uv run uvicorn app.main:app --reload --host 127.0.0.1 --port 8000
    desc: Run FastAPI in development mode.

  run-uvicorn-prod:
    aliases: ["app-prod"]
    cmds:
      - uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    desc: Run FastAPI with production-like Uvicorn settings (no reload).

  db-upgrade:
    aliases: ["db-migrate"]
    cmds:
      - uv run alembic upgrade head
    desc: Apply all pending Alembic migrations to PostgreSQL.

  db-downgrade:
    cmds:
      - uv run alembic downgrade -1
    desc: Roll back the latest Alembic migration.

  db-current:
    cmds:
      - uv run alembic current
    desc: Show the currently applied Alembic revision.

  db-history:
    cmds:
      - uv run alembic history --verbose
    desc: Show Alembic migration history.

  run-pytest:
    aliases: ["test"]
    cmds:
      - uv run pytest -v
    desc: Run all tests with pytest in verbose mode.

  run-dev:
    cmds:
      - uv sync --dev
      - task db-start
      - task db-upgrade
      - task run-uvicorn
    desc: Run the application in development mode, ensuring the database is up to date.
      
