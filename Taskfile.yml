version: '3'

tasks:
  run-uvicorn:
    cmds:
      - uv run uvicorn app.main:app --reload
    desc: Run the FastAPI application with Uvicorn in development mode.

  run-uvicorn-prod:
    cmds:
      - uv run uvicorn app.main:app --host

  init-alembic:
    cmds:
      - uv run alembic init alembic
    desc: Initialize Alembic for database migrations.

  test-migrations:
    cmds:
      - uv run alembic revision --autogenerate -m "Test migration"
    desc: Create a test migration to verify Alembic setup.

  test-auth:
    cmds:
      - uv run python -c "from app.services.authentication import hash_password, verify_password; p='A'*120; h=hash_password(p); print(verify_password(p,h))"
    desc: Run tests related to authentication.

  run-pytest:
    cmds:
      - uv run pytest -v
    desc: Run all tests with pytest in verbose mode.
